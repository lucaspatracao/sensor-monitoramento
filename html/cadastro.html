<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta | Sensora</title>
    <link rel="icon" type="image/png" href="../img/sensor-logo.png">
    <link rel="stylesheet" href="../css/estilo.css">
    <link rel="stylesheet" href="../css/cadastro.css">
</head>

<body class="pagina-cadastro">
    <main class="container-cadastro">
        <div class="cartao-cadastro-wrapper">
            <div class="logo-cadastro">
                <img src="../img/sensor-logo.png" alt="Sensor Logo" class="imagem-logo-cadastro">
                <span class="texto-logo-cadastro">Sensora</span>
            </div>
            <div class="cartao-cadastro">
                <h1 class="titulo-cadastro">Criar Conta</h1>
                <form class="formulario-cadastro" id="formularioCadastro">
                    <div class="grupo-campo">
                        <label for="nomeCompleto" class="rotulo-campo">Nome Completo:</label>
                        <input type="text" id="nomeCompleto" name="nomeCompleto" class="entrada-campo"
                            placeholder="Digite seu nome completo" required>
                    </div>
                    <div class="grupo-campo">
                        <label for="email" class="rotulo-campo">Email:</label>
                        <input type="email" id="email" name="email" class="entrada-campo"
                            placeholder="exemplo@dominio.com" required>
                    </div>
                    <div class="grupo-campo">
                        <label for="senhaCadastro" class="rotulo-campo">Senha:</label>
                        <input type="password" id="senhaCadastro" name="senha" class="entrada-campo"
                            placeholder="Digite sua senha" required>
                    </div>
                    <div class="grupo-campo">
                        <label for="confirmarSenha" class="rotulo-campo">Confirmar Senha:</label>
                        <input type="password" id="confirmarSenha" name="confirmarSenha" class="entrada-campo"
                            placeholder="Confirme sua senha" required>
                    </div>
                    <div class="acoes-formulario">
                        <button type="submit" class="botao-primario" id="botaoCadastrar">Cadastrar</button>
                    </div>
                    <div class="links-auxiliares">
                        <a href="../index.html" class="link-ja-possui-conta">Já possuo uma Conta</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="../js/dark-mode.js"></script>
    <script src="../js/cadastro.js"></script>

    <!-- Botão Dark Mode -->
    <button class="botao-dark-mode" id="botaoDarkMode" aria-label="Alternar modo escuro">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
            <path
                d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z" />
        </svg>
        <span class="texto-dark-mode">Escuro</span>
    </button>
</body>

</html>
