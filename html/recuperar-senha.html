<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha | Sensora</title>
    <link rel="icon" type="image/png" href="../img/sensor-logo.png">
    <link rel="stylesheet" href="../css/estilo.css">
    <link rel="stylesheet" href="../css/recuperar-senha.css">
</head>

<body class="pagina-recuperar-senha">
    <main class="container-recuperar-senha">
        <div class="cartao-recuperar-senha-wrapper">
            <div class="logo-recuperar-senha">
                <img src="../img/sensor-logo.png" alt="Sensor Logo" class="imagem-logo-recuperar-senha">
                <span class="texto-logo-recuperar-senha">Sensora</span>
            </div>
            <div class="cartao-recuperar-senha">
                <h1 class="titulo-recuperar-senha">Acessar</h1>
                <p class="subtitulo-recuperar-senha">Recupere sua Senha</p>
                <form class="formulario-recuperar-senha" id="formularioRecuperarSenha">
                    <div class="grupo-campo">
                        <label for="emailRecuperacao" class="rotulo-campo">Email de Recuperação:</label>
                        <input type="email" id="emailRecuperacao" name="email" class="entrada-campo"
                            placeholder="exemplo@dominio.com" required>
                    </div>
                    <div class="acoes-formulario">
                        <button type="submit" class="botao-primario" id="botaoEnviar">Enviar</button>
                    </div>
                    <div class="links-auxiliares">
                        <a href="../index.html" class="link-voltar-login">Voltar para o Login</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="../js/dark-mode.js"></script>
    <script src="../js/recuperar-senha.js"></script>

    <!-- Botão Dark Mode -->
    <button class="botao-dark-mode" id="botaoDarkMode" aria-label="Alternar modo escuro">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
            <path
                d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z" />
        </svg>
        <span class="texto-dark-mode">Escuro</span>
    </button>
</body>

</html>
